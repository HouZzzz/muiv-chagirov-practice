<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .dark {
            background-color: gray;
            color: white;
        }

        .hide {
            display: none;
        }
    </style>
</head>
<body>
    <h2>3</h2>
    <a id="redirect-google">перейти</a>
    <hr>
    <h2>5</h2>
    <img id="cat-img" alt="картинка кота">
    <hr>

    <h2>6,7</h2>
    <ul id="list"></ul>
    <button id="delete-last">удалить последний элемент</button>
    <hr>

    <h2>8</h2>
    <button id="change-bg">сменить цвет фона</button>
    <hr>
    
    <h2>9</h2>
    <input type="text" id="input-to-show">
    <button id="process-value-display">показать значение</button>
    <p id="value-display">Значение поля:</p>
    <hr>

    <h2>10</h2>
    <div id="text-block">блок с текстом!</div>
    <button id="toggle-text">вкл/выкл текст</button>
    <hr>

    <h2>11</h2>
    <span id="count">0</span>
    <button id="increase">+</button>
    <button id="decrease">-</button>
    <hr>

    <h2>12</h2>
    <ol id="todo-list"></ol>
    <input type="text" id="todo-task">
    <button id="add-task">добавить задание</button>
    <hr>

    <h2>13</h2>
    <button id="toggle-theme">Тема</button>
    <hr>

    <h2>14</h2>
    <div id="time"></div>
    <hr>

    <h2>15</h2>
    <p id="quote"></p>
    <button id="show-quote">показать цитату</button>
    <hr>

    <h2>16</h2>
    <p>угадай число</p>
    <h3 id="guess-result"></h3> 
    <input type="number" value="1" min="1" max="10" id="guess">
    <button id="check">проверить</button>
    <hr>

    <script src="index.js"></script>
</body>
</html>
